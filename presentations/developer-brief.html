async function calculatePay(shift: ShiftInput): Promise<PayResult> {
  // 1. Determine day type from date
  const dayOfWeek = shift.date.getDay(); // 0=Sunday, 6=Saturday
  const dayType = dayOfWeek === 0 ? 'sunday'
                : dayOfWeek === 6 ? 'saturday'
                : 'weekday';

  // 2. Determine rate year (changes April 1st!)
  const month = shift.date.getMonth(); // 0-indexed
  const year = shift.date.getFullYear();
  const rateYear = month < 3 ? year - 1 : year; // Jan-Mar use previous year

  // 3. Get base rate for day_type + shift_type + year
  const baseRate = BASE_RATES[rateYear][dayType][shift.shiftType];

  // 4. Add job differential
  const jobClass = JOB_CLASSIFICATIONS[shift.jobCode]; // e.g., "CLASS_1"
  const differential = DIFFERENTIALS[jobClass] || 0;   // e.g., 2.50
  const rate = baseRate + differential;

  // 5. Look up hours from PAYDIFFS (or use defaults)
  const hoursOverride = await queryPayDiffs(shift.jobCode, shift.shiftType, shift.location, shift.subjob);

  const hours = hoursOverride || {
    regular: shift.shiftType === 'GRAVEYARD' ? 6.5 : 8,
    overtime: 0
  };

  // 6. Calculate final pay
  const regularPay = rate * hours.regular;
  const overtimePay = (rate * 1.5) * hours.overtime;
  const totalPay = regularPay + overtimePay;

  return {
    rate,
    regularHours: hours.regular,
    overtimeHours: hours.overtime,
    regularPay,
    overtimePay,
    totalPay
  };
}`} />

SELECT regular_hours, overtime_hours
FROM pay_differentials
WHERE job_code = :job
  AND shift_type = :shift_type
  AND (location_code = :location OR location_code IS NULL)
  AND (subjob_code = :subjob OR subjob_code IS NULL)
ORDER BY
  location_code NULLS LAST,  -- Specific location first
  subjob_code NULLS LAST     -- Specific subjob first
LIMIT 1;

-- If no match found, use defaults:
-- DAY/NIGHT: 8 hours regular, 0 OT
-- GRAVEYARD: 6.5 hours regular, 0 OT`} />

  const year = shiftDate.getFullYear();
  const month = shiftDate.getMonth(); // 0-indexed (0=Jan, 3=Apr)

  // If Jan, Feb, or Mar → use PREVIOUS year's rates
  if (month < 3) {
    return year - 1;
  }
  return year;
}

// Examples:
// March 15, 2025 → rate year 2024 (uses Apr 2024 - Mar 2025 rates)
// April 1, 2025 → rate year 2025 (uses Apr 2025 - Mar 2026 rates)

  if (shiftType === 'GRAVEYARD') {
    return { regular: 6.5, overtime: 0 };
  }
  // DAY or NIGHT
  return { regular: 8, overtime: 0 };
}`} />

if (jobCode === 'WHEAT MACHINE' || jobCode === 'WHEAT SPECIALTY') {
  // Don't query PAYDIFFS - always use these values
  return {
    regular: 7.5,
    overtime: 0.5,  // Built-in half hour OT
    differential: 1.15  // WHEAT class differential
  };
}`} />
                </Section>

                <Section title="Handling TRAINER Rates">
                  <CodeBlock code={`// TRAINER gets a multiplier on base rate
if (jobCode === 'TRAINER') {
  const baseRate = getBaseRate(dayType, shiftType, rateYear);

  if (trainerType === 'SENIOR') {
    // Use senior rate table (different structure)
    return getSeniorRate(dayType, shiftType, rateYear);
  } else {
    // Regular trainer: 33.3% premium
    return baseRate * 1.333;
  }
}`} />
                </Section>

TRACTOR TRAILER,DAY,CENTENNIAL,,9,0
TRACTOR TRAILER,NIGHT,CENTENNIAL,,9,0
TRACTOR TRAILER,GRAVEYARD,CENTENNIAL,,7.5,0
HEAD CHECKER,DAY,CENTENNIAL,,9,0
WHEAT MACHINE,DAY,,,7.5,0.5
WHEAT MACHINE,NIGHT,,,7.5,0.5
DOCK GANTRY,DAY,,"SPECIAL",0,5
LINES,DAY,,,4,0`} />

                      <li className="flex items-center gap-2 text-red-600">

                  </div>

          </main>

          {/* Footer */}
          <footer className="bg-slate-800 text-white py-6 px-6">
            <div className="max-w-6xl mx-auto flex items-center justify-between text-sm">
              <span className="text-slate-400">PORTPAL Developer Brief</span>
              <span className="text-slate-500">Current: Bubble → Target: React + Supabase</span>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
